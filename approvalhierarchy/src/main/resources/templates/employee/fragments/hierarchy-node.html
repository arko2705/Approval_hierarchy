<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="employee-node(nodeEmployee)">
        <div class="employee-card mb-2">
            <div class="emp-name" th:text="${nodeEmployee?.name ?: 'Unknown'}">Employee Name</div>
            <div class="emp-position" th:text="${nodeEmployee?.position ?: 'N/A'}">Position</div>
        </div>
        <ul th:if="${nodeEmployee != null and not #lists.isEmpty(nodeEmployee.subordinates)}">
            <li th:each="sub : ${nodeEmployee.subordinates}">
                <div th:insert="~{employee/fragments/hierarchy-node :: employee-node(nodeEmployee=${sub})}"></div>
            </li>
        </ul>
    </div>
</body>
</html>
