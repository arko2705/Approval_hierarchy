<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team — Approval Hierarchy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<header class="app-header">
    <a href="/" class="brand text-decoration-none">
        <div class="brand-icon">A</div>
        Approval Hierarchy
    </a>
    <nav class="d-flex align-items-center gap-1">
        <a th:href="@{/}">Dashboard</a>
        <a class="active" th:href="@{/employees}">Employees</a>
        <a th:href="@{/requests}">Requests</a>
        <a th:href="@{/employees/hierarchy}">Hierarchy</a>
    </nav>
    <div style="width:120px;"></div>
</header>

<div class="container page-wrapper">
    <div class="page-header">
        <div>
            <h2 style="margin:0;">
                Team of <span th:text="${manager.name}" style="color:var(--color-primary);"></span>
            </h2>
            <p class="page-subtitle" th:text="${manager.position}"></p>
        </div>
        <a th:href="@{/employees}" class="btn btn-secondary">← Back to Employees</a>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Position</th>
                        <th>Department</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="employee : ${subordinates}">
                        <td th:text="${employee.id}" style="color:var(--gray-400);font-size:0.8rem;"></td>
                        <td style="font-weight:600;" th:text="${employee.name}"></td>
                        <td th:text="${employee.email}" style="color:var(--gray-500);font-size:0.85rem;"></td>
                        <td th:text="${employee.position}"></td>
                        <td><span class="badge bg-secondary" th:text="${employee.department}"></span></td>
                    </tr>
                    <tr th:if="${subordinates.empty}">
                        <td colspan="5" style="text-align:center;color:var(--gray-400);padding:2rem;">This manager has no direct reports</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer>&copy; 2025 Approval Hierarchy System</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
