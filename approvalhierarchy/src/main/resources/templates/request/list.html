<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requests — Approval Hierarchy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<header class="app-header">
    <a href="/" class="brand text-decoration-none">
        <div class="brand-icon">A</div>
        Approval Hierarchy
    </a>
    <nav class="d-flex align-items-center gap-1">
        <a th:href="@{/}">Dashboard</a>
        <a th:href="@{/employees}">Employees</a>
        <a class="active" th:href="@{/requests}">Requests</a>
        <a th:href="@{/employees/hierarchy}">Hierarchy</a>
    </nav>
    <div style="width:120px;"></div>
</header>

<div class="container page-wrapper">
    <div class="page-header">
        <div>
            <h2 style="margin:0;">All Requests</h2>
            <p class="page-subtitle" th:if="${status}">
                Filtered by status: <span class="badge bg-primary" th:text="${status}"></span>
            </p>
        </div>
        <a th:href="@{/requests/create}" class="btn btn-primary">+ New Request</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="table-card">
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Title</th>
                        <th>Requestor</th>
                        <th>Current Approver</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="request : ${requests}">
                        <td th:text="${request.id}" style="color:var(--gray-400);font-size:0.8rem;"></td>
                        <td>
                            <a th:href="@{'/requests/view/' + ${request.id}}"
                               th:text="${request.title}"
                               style="font-weight:600; color:var(--gray-800);">Request Title</a>
                        </td>
                        <td th:text="${request.requestor.name}"></td>
                        <td th:text="${request.approver != null ? request.approver.name : '—'}"></td>
                        <td>
                            <span th:class="|badge bg-${request.status != null && request.status.name() == 'PENDING' ? 'warning' :
                                request.status != null && request.status.name() == 'APPROVED' ? 'success' :
                                request.status != null && request.status.name() == 'REJECTED' ? 'danger' : 'secondary'}|"
                                  th:text="${request.status != null ? request.status.name() : 'N/A'}">Status</span>
                        </td>
                        <td th:text="${#temporals.format(request.createdAt, 'dd MMM yyyy, HH:mm')}" style="font-size:0.82rem; color:var(--gray-500);"></td>
                        <td>
                            <div class="action-btns">
                                <a th:href="@{'/requests/view/' + ${request.id}}" class="btn btn-sm btn-info">View</a>
                                <span th:if="${request.requestor.id == currentEmployeeId and request.status != null and request.status.name() == 'PENDING'}"
                                      class="text-muted" style="font-size:0.78rem; font-style:italic; align-self:center;">Awaiting approval</span>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${requests == null or requests.empty}">
                        <td colspan="7" style="text-align:center;color:var(--gray-400);padding:2rem;">No requests found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer>&copy; 2025 Approval Hierarchy System</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
