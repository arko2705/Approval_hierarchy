<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reject Request — Approval Hierarchy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<header class="app-header">
    <a href="/" class="brand text-decoration-none">
        <div class="brand-icon">A</div>
        Approval Hierarchy
    </a>
    <nav class="d-flex align-items-center gap-1">
        <a th:href="@{/}">Dashboard</a>
        <a th:href="@{/employees}">Employees</a>
        <a class="active" th:href="@{/requests}">Requests</a>
        <a th:href="@{/employees/hierarchy}">Hierarchy</a>
    </nav>
    <div style="width:120px;"></div>
</header>

<div class="container page-wrapper">
    <div class="page-header">
        <div>
            <h2 style="margin:0;">Reject Request</h2>
            <p class="page-subtitle">Provide a reason for rejecting this request</p>
        </div>
        <a th:href="@{'/requests/view/' + ${request.id}}" class="btn btn-secondary">← Back to Request</a>
    </div>

    <div class="row">
        <div class="col-lg-7">
            <div class="card mb-3">
                <div class="card-header" th:text="${request.title}">Request Title</div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <div class="detail-row">
                                <span class="detail-label">Requestor</span>
                                <span class="detail-value" th:text="${request.requestor.name}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-row">
                                <span class="detail-label">Submitted</span>
                                <span class="detail-value" th:text="${#temporals.format(request.createdAt, 'dd MMM yyyy, HH:mm')}"></span>
                            </div>
                        </div>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Description</span>
                        <div class="desc-box" th:text="${request.description ?: 'No description provided.'}"></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Rejection Reason</div>
                <div class="card-body">
                    <form th:action="@{/requests/reject/{id}(id=${request.id})}" method="post">
                        <div class="mb-3">
                            <label for="comments" class="form-label">Reason <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="comments" name="comments" rows="3"
                                      placeholder="Please provide a clear reason for rejection..." required></textarea>
                        </div>
                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{'/requests/view/' + ${request.id}}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-danger">✕ Confirm Rejection</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>&copy; 2025 Approval Hierarchy System</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
