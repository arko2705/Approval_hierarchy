<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Approval Hierarchy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<header class="app-header">
    <a href="/" class="brand text-decoration-none">
        <div class="brand-icon">A</div>
        Approval Hierarchy
    </a>
    <nav class="d-flex align-items-center gap-1">
        <a th:href="@{/}">Dashboard</a>
        <a th:href="@{/employees}">Employees</a>
        <a th:href="@{/requests}">Requests</a>
        <a class="active" href="/admin">Admin</a>
    </nav>
    <div style="width:120px;"></div>
</header>

<div class="container page-wrapper">
    <div class="page-header">
        <div>
            <h2 style="margin:0;">Admin Dashboard</h2>
            <p class="page-subtitle">Manage system users and account permissions</p>
        </div>
    </div>

    <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${param.error}" class="alert alert-danger" th:text="${param.error}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${param.success}" class="alert alert-success">
        <span th:if="${param.success[0] == 'userupdated'}">✓ User updated successfully.</span>
        <span th:if="${param.success[0] == 'userdeleted'}">✓ User deleted successfully.</span>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Roles</th>
                        <th>Linked Employee</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}" style="color:var(--gray-400);font-size:0.8rem;"></td>
                        <td style="font-weight:600;" th:text="${user.username}"></td>
                        <td th:text="${user.email}" style="color:var(--gray-500);font-size:0.85rem;"></td>
                        <td>
                            <span th:each="role, iterStat : ${user.roles}"
                                  class="badge bg-primary"
                                  th:text="${role.name}"
                                  style="margin-right:2px;"></span>
                        </td>
                        <td th:text="${user.employee != null ? user.employee.name + ' (' + user.employee.position + ')' : '—'}"></td>
                        <td>
                            <div class="action-btns">
                                <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="btn btn-sm btn-secondary">Edit</a>
                                <a th:href="@{/admin/users/{id}/delete(id=${user.id})}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Delete this user? This cannot be undone.')">Delete</a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${users == null or users.empty}">
                        <td colspan="6" style="text-align:center;color:var(--gray-400);padding:2rem;">No users found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer>&copy; 2025 Approval Hierarchy System</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
