<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User — Approval Hierarchy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<header class="app-header">
    <a href="/" class="brand text-decoration-none">
        <div class="brand-icon">A</div>
        Approval Hierarchy
    </a>
    <nav class="d-flex align-items-center gap-1">
        <a th:href="@{/}">Dashboard</a>
        <a th:href="@{/employees}">Employees</a>
        <a th:href="@{/requests}">Requests</a>
        <a class="active" href="/admin">Admin</a>
    </nav>
    <div style="width:120px;"></div>
</header>

<div class="container page-wrapper">
    <div class="page-header">
        <div>
            <h2 style="margin:0;">Edit User</h2>
            <p class="page-subtitle">Update account information for <strong th:text="${user.username}"></strong></p>
        </div>
        <a href="/admin" class="btn btn-secondary">← Back to Admin</a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row">
        <div class="col-lg-7">
            <form th:action="@{/admin/users/{id}/update(id=${user.id})}" th:object="${user}" method="post">
                <div class="card">
                    <div class="card-header">Account Information</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" th:field="*{username}" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" th:field="*{email}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Roles</label>
                            <div style="display:flex;flex-wrap:wrap;gap:0.75rem;padding:0.75rem;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius-sm);">
                                <div class="form-check" th:each="role : ${roles}" style="margin:0;">
                                    <input class="form-check-input" type="checkbox"
                                           th:name="roleIds" th:value="${role.id}" th:id="${'role-' + role.id}"
                                           th:checked="${user.roles.contains(role)}">
                                    <label class="form-check-label" th:for="${'role-' + role.id}" th:text="${role.name}"></label>
                                </div>
                            </div>
                        </div>
                        <div class="mb-0">
                            <label for="employeeId" class="form-label">Linked Employee</label>
                            <select class="form-select" id="employeeId" name="employeeId">
                                <option value="">— Not linked to any employee —</option>
                                <option th:each="employee : ${employees}"
                                        th:value="${employee.id}"
                                        th:text="${employee.name + ' (' + employee.position + ')'}"
                                        th:selected="${user.employee != null && user.employee.id == employee.id}">
                                </option>
                            </select>
                        </div>
                    </div>
                    <div class="card-footer justify-content-end">
                        <a href="/admin" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<footer>&copy; 2025 Approval Hierarchy System</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
