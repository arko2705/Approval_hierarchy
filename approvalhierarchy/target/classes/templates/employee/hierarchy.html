<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Org Hierarchy — Approval Hierarchy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<header class="app-header">
    <a href="/" class="brand text-decoration-none">
        <div class="brand-icon">A</div>
        Approval Hierarchy
    </a>
    <nav class="d-flex align-items-center gap-1">
        <a th:href="@{/}">Dashboard</a>
        <a th:href="@{/employees}">Employees</a>
        <a th:href="@{/requests}">Requests</a>
        <a class="active" th:href="@{/employees/hierarchy}">Hierarchy</a>
    </nav>
    <div style="width:120px;"></div>
</header>

<div class="container page-wrapper">
    <div class="page-header">
        <div>
            <h2 style="margin:0;">Organisational Hierarchy</h2>
            <p class="page-subtitle">The full reporting structure of the organisation</p>
        </div>
        <a th:href="@{/employees}" class="btn btn-secondary">View All Employees</a>
    </div>

    <div class="card">
        <div class="card-body" style="padding:1.5rem 2rem;">
            <div th:if="${hierarchy.empty}" class="alert alert-info">
                No employees in the system yet.
                <a th:href="@{/employees/add}">Add your first employee</a> to see the hierarchy.
            </div>

            <div class="org-tree">
                <ul th:unless="${hierarchy.empty}">
                    <li th:each="topManager : ${hierarchy}">
                        <div class="employee-card mb-2">
                            <div class="emp-name" th:text="${topManager?.name ?: 'Unknown'}"></div>
                            <div class="emp-position" th:text="${topManager?.position ?: 'N/A'}"></div>
                        </div>
                        <div th:if="${topManager != null and not #lists.isEmpty(topManager.subordinates)}" th:remove="tag">
                            <ul>
                                <li th:each="manager : ${topManager.subordinates}">
                                    <div th:insert="~{employee/fragments/hierarchy-node :: employee-node(nodeEmployee=${manager})}"></div>
                                </li>
                            </ul>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>

<footer>&copy; 2025 Approval Hierarchy System</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
