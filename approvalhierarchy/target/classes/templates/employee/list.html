<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees — Approval Hierarchy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<header class="app-header">
    <a href="/" class="brand text-decoration-none">
        <div class="brand-icon">A</div>
        Approval Hierarchy
    </a>
    <nav class="d-flex align-items-center gap-1">
        <a th:href="@{/}">Dashboard</a>
        <a class="active" th:href="@{/employees}">Employees</a>
        <a th:href="@{/requests}">Requests</a>
        <a th:href="@{/employees/hierarchy}">Hierarchy</a>
    </nav>
    <div style="width:120px;"></div>
</header>

<div class="container page-wrapper">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="page-header">
        <div>
            <h2 style="margin:0;">Employees</h2>
            <p class="page-subtitle">All registered employees in the system</p>
        </div>
        <a th:href="@{/employees/add}" class="btn btn-primary">+ Add Employee</a>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Position</th>
                        <th>Department</th>
                        <th>Reports To</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="employee : ${employees}">
                        <td th:text="${employee.id}" style="color:var(--gray-400);font-size:0.8rem;"></td>
                        <td>
                            <div style="font-weight:600;" th:text="${employee.name}"></div>
                        </td>
                        <td th:text="${employee.email}" style="color:var(--gray-500);font-size:0.85rem;"></td>
                        <td th:text="${employee.position}"></td>
                        <td><span class="badge bg-secondary" th:text="${employee.department}"></span></td>
                        <td th:text="${employee.manager != null ? employee.manager.name : '—'}"></td>
                        <td>
                            <div class="action-btns">
                                <a th:href="@{/employees/edit/{id}(id=${employee.id})}" class="btn btn-sm btn-secondary">Edit</a>
                                <a th:href="@{/employees/delete/{id}(id=${employee.id})}" class="btn btn-sm btn-danger"
                                   onclick="return confirm('Delete this employee?')">Delete</a>
                                <a th:href="@{/requests/by-employee/{id}(id=${employee.id})}" class="btn btn-sm btn-info">Requests</a>
                                <a th:if="${employee.subordinates.size() > 0}"
                                   th:href="@{/employees/subordinates/{id}(id=${employee.id})}"
                                   class="btn btn-sm btn-outline-secondary">Team</a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${employees.empty}">
                        <td colspan="7" style="text-align:center;color:var(--gray-400);padding:2rem;">No employees found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer>&copy; 2025 Approval Hierarchy System</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
