<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Form - Approval Hierarchy System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <div class="container">
        <header class="py-3 mb-4 border-bottom">
            <div class="d-flex flex-column flex-md-row align-items-center">
                <a href="/" class="d-flex align-items-center text-dark text-decoration-none">
                    <span class="fs-4">Approval Hierarchy System</span>
                </a>
                <nav class="d-inline-flex mt-2 mt-md-0 ms-md-auto">
                    <a class="me-3 py-2 text-dark text-decoration-none" th:href="@{/employees}">Employees</a>
                    <a class="me-3 py-2 text-dark text-decoration-none" th:href="@{/requests}">Requests</a>
                    <a class="py-2 text-dark text-decoration-none" th:href="@{/employees/hierarchy}">Hierarchy</a>
                </nav>
            </div>
        </header>

        <div class="row">
            <div class="col-md-6 offset-md-3">
    <form th:action="${dto.employee.id != null} ? @{/employees/edit/{id}(id=${dto.employee.id})} : @{/employees/add}" th:object="${dto}" method="post">
    
    <h4 class="mb-3">1. Employee Details</h4>
    <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" th:field="*{employee.name}" required>
    </div>
    
    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" th:field="*{employee.email}" required>
    </div>
    
    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="position" class="form-label">Position</label>
            <input type="text" class="form-control" id="position" th:field="*{employee.position}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label for="department" class="form-label">Department</label>
            <input type="text" class="form-control" id="department" th:field="*{employee.department}" required>
        </div>
    </div>
    
    <div class="mb-3">
        <label for="manager" class="form-label">Reports To (Manager)</label>
        <select class="form-select" id="manager" th:field="*{employee.manager}">
            <option value="">-- No Manager (Top Level) --</option>
            <option th:each="mgr : ${managers}" 
                    th:value="${mgr.id}" 
                    th:text="${mgr.name + ' (' + mgr.position + ')'}">
            </option>
        </select>
    </div>

    <hr class="my-4">

    <h4 class="mb-3">2. Login Details</h4>
    <div class="row">
        <div class="col-md-4 mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" th:field="*{username}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" th:field="*{password}" th:required="${dto.employee.id == null}">
        </div>
        <div class="col-md-4 mb-3">
            <label for="role" class="form-label">Role</label>
            <select class="form-select" id="role" th:field="*{role}" required>
                <option value="USER">Regular User</option>
                <option value="MANAGER">Manager</option>
                <option value="HR">HR Staff</option>
                <option value="ADMIN">Administrator</option>
            </select>
        </div>
    </div>
    
    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
        <a th:href="@{/employees}" class="btn btn-secondary me-md-2">Cancel</a>
        <button type="submit" class="btn btn-primary">Create Employee</button>
    </div>
</form>
            </div>
        </div>

        <footer class="pt-3 mt-4 text-muted border-top">
            &copy; 2025 Approval Hierarchy System
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
